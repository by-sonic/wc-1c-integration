services:
  db:
    image: mariadb:10.11
    container_name: wc1c-test-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.8-php8.2
    container_name: wc1c-test-wp
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    ports:
      - "8082:80"
    volumes:
      - wp_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wc-1c-integration

  wpcli:
    image: wordpress:cli-2.11-php8.2
    container_name: wc1c-test-cli
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wc-1c-integration
      - ./tests:/tests
    user: "33:33"
    entrypoint: ["sh", "-c", "sleep infinity"]

volumes:
  wp_data:
